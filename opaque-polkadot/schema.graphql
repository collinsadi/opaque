# Announcement entity: raw hex data needed for stealth derivation.
# id is transaction hash (txHash) for compatibility; uniqueness is txHash + logIndex.
type Announcement @entity(immutable: true) {
  id: ID!
  etherealPublicKey: Bytes!
  viewTag: Int!
  metadata: Bytes!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
  logIndex: Int!
  stealthAddress: Bytes!
}