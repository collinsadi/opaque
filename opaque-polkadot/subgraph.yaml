specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: StealthAddressAnnouncer
    network: polkadot-testnet
    source:
      address: "0xD5FDa624D5F58F4586A959ff3e9c7CA72a9b74D8"
      abi: StealthAddressAnnouncer
      startBlock: 5590094
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Announcement
      abis:
        - name: StealthAddressAnnouncer
          file: ./abis/StealthAddressAnnouncer.json
      eventHandlers:
        - event: Announcement(indexed uint256,indexed address,indexed address,bytes,bytes)
          handler: handleAnnouncement
      file: ./src/stealth-address-announcer.ts
