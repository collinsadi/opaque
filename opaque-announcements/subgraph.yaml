specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: StealthAddressAnnouncer
    network: sepolia
    source:
      address: "0x840f72249A8bF6F10b0eB64412E315efBD730865"
      abi: StealthAddressAnnouncer
      startBlock: 10298567
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Announcement
      abis:
        - name: StealthAddressAnnouncer
          file: ./abis/StealthAddressAnnouncer.json
      eventHandlers:
        - event: Announcement(indexed uint256,indexed address,indexed address,bytes,bytes)
          handler: handleAnnouncement
      file: ./src/stealth-address-announcer.ts
